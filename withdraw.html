<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* 🔥 BACKGROUND */
body{
  background: radial-gradient(circle at top, #1e293b, #020617 70%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

/* CARD */
.container{
  background: rgba(15,23,42,0.75);
  padding:28px;
  border-radius:18px;
  width:360px;
  backdrop-filter: blur(18px);
  text-align:center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2{
  margin-bottom:15px;
  color:#38bdf8;
}

/* ✨ INFO BOX */
.info-box{
  background: rgba(2,6,23,0.9);
  border:1px solid rgba(56,189,248,0.2);
  padding:14px;
  border-radius:12px;
  text-align:left;
  margin-bottom:15px;
  font-size:12px;
  color:#94a3b8;
  line-height:1.6;
}

.info-box b{
  color:#38bdf8;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:#fff;
  border:1px solid rgba(148,163,184,0.2);
}

/* 🔒 LOCKED INPUT */
input[readonly]{
  opacity:0.7;
  cursor:not-allowed;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#0ea5e9,#6366f1);
  color:#fff;
  cursor:pointer;
  box-shadow:0 4px 15px rgba(14,165,233,0.4);
}

button:hover{
  opacity:0.95;
}

/* POPUP */
.popup{
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) scale(0.85);
  background:#020617;
  padding:20px;
  border-radius:14px;
  text-align:center;
  opacity:0;
  transition:0.25s;
  z-index:1000;
  width:280px;
}

.popup.show{
  opacity:1;
  transform: translate(-50%,-50%) scale(1);
}

.popup.success{border:2px solid #22c55e;}
.popup.error{border:2px solid #ef4444;}

.popup-buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.popup-buttons button{
  flex:1;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Withdraw Funds</h2>

  <!-- ✨ PROFESSIONAL INFO -->
  <div class="info-box">
    • Withdrawals are securely processed to your <b>registered mobile number only</b><br><br>
    • Minimum withdrawal: <b>2,000 UGX</b><br>
    • Maximum withdrawal: <b>2,000,000 UGX</b><br><br><br>
    • Fast processing & secure transactions guaranteed ⚡
  </div>

  <input type="number" id="amount" placeholder="Enter Amount">

  <select id="network">
    <option value="">Select Network</option>
    <option value="MTN">MTN Mobile Money</option>
    <option value="Airtel">Airtel Money</option>
  </select>

  <!-- 🔒 AUTO FILLED -->
  <input type="text" id="account" placeholder="Phone Number" readonly>

  <button onclick="withdraw()">Withdraw Now</button>
</div>

<div id="popup" class="popup">
  <p id="popupMsg"></p>
  <div id="popupActions" class="popup-buttons"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { 
  getDatabase, 
  ref, 
  onValue, 
  update, 
  push,
  get
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* ✅ CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentBalance = 0;
let userId = null;

/* POPUP */
function showPopup(msg,type,buttons=[]){
  const popup=document.getElementById("popup");
  popup.className="popup show "+type;
  document.getElementById("popupMsg").innerText=msg;

  const actions=document.getElementById("popupActions");
  actions.innerHTML="";

  buttons.forEach(btn=>{
    let b=document.createElement("button");
    b.innerText=btn.text;
    b.onclick=btn.action;
    actions.appendChild(b);
  });

  if(buttons.length===0){
    setTimeout(()=>popup.classList.remove("show"),2500);
  }
}

/* LOAD USER + AUTO PHONE */
auth.onAuthStateChanged(user=>{
  if(user){
    userId=user.uid;

    onValue(ref(db,"users/"+userId),snap=>{
      let d=snap.val();
      if(!d) return;

      let main=d.balance||0;
      let locked=d.lockedBalance||0;

      currentBalance=main-locked;
      if(currentBalance<0) currentBalance=0;

      document.getElementById("account").value = d.phone || "";
    });

  }else{
    location.href="login.html";
  }
});

/* CHECK REFERRALS */
async function checkReferrals(){
  const snap = await get(ref(db,"users"));
  let count = 0;

  snap.forEach(u=>{
    let d = u.val();
    if(d.referredBy === userId && (d.totalDeposits||0) >= 20000){
      count++;
    }
  });

  return count;
}

/* WITHDRAW */
window.withdraw = async function(){
  let amount=parseFloat(amountInput.value);
  let network=networkSelect.value;
  let account=accountInput.value.trim();

  if(!amount || !account) return showPopup("Fill all fields","error");
  if(!network) return showPopup("Select network","error");
  if(amount<2000) return showPopup("Minimum is 2,000 UGX","error");
  if(amount>2000000) return showPopup("Maximum is 2,000,000 UGX","error");
  if(amount>currentBalance) return showPopup("Insufficient balance","error");

  if(amount >= 10000){
    let refs = await checkReferrals();

    if(refs < 5){
      return showPopup(
        "Action required to proceed",
        "error",
        [
          {text:"Buy Referrals", action:()=>location.href="buyref.html"},
          {text:"Click To Refer", action:()=>location.href="referral.html"}
        ]
      );
    }
  }

  await push(ref(db,"withdrawals"),{
    userId,
    amount,
    network,
    account,
    status:"pending",
    createdAt:Date.now()
  });

  await update(ref(db,"users/"+userId),{
    balance: currentBalance - amount
  });

  showPopup("Withdrawal submitted successfully","success");

  amountInput.value="";
  networkSelect.value="";
}

/* INPUTS */
const amountInput=document.getElementById("amount");
const networkSelect=document.getElementById("network");
const accountInput=document.getElementById("account");

</script>

</body>
</html>
