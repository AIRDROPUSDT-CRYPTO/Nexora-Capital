<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* 🔥 NEW PROFESSIONAL BACKGROUND */
body{
  background: radial-gradient(circle at top, #1e293b, #020617 70%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

/* CARD */
.container{
  background: rgba(15,23,42,0.75);
  padding:30px;
  border-radius:18px;
  width:360px;
  backdrop-filter: blur(18px);
  text-align:center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2{
  margin-bottom:20px;
  color:#38bdf8;
  font-weight:600;
}

/* BALANCE */
.balance-box{
  background: rgba(2,6,23,0.9);
  padding:14px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid rgba(56,189,248,0.2);
}

.balance-box p{
  font-size:13px;
  color:#94a3b8;
}

.balance-box h3{
  margin-top:5px;
  font-size:18px;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:#fff;
  border:1px solid rgba(148,163,184,0.2);
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#0ea5e9,#6366f1);
  color:#fff;
  font-weight:500;
  cursor:pointer;
  box-shadow: 0 4px 15px rgba(14,165,233,0.4);
}

button:hover{
  opacity:0.95;
}

/* POPUP */
.popup{
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) scale(0.85);
  background:#020617;
  padding:20px 30px;
  border-radius:14px;
  text-align:center;
  opacity:0;
  transition:0.25s;
  z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.popup.show{
  opacity:1;
  transform: translate(-50%,-50%) scale(1);
}

.popup.success{
  border:2px solid #22c55e;
}

.popup.error{
  border:2px solid #ef4444;
}
</style>
</head>

<body>

<div class="container">
  <h2>Withdraw Funds</h2>

  <div class="balance-box">
    <p>Withdrawable Balance</p>
    <h3 id="balance">0 UGX</h3>
  </div>

  <input type="number" id="amount" placeholder="Enter Amount">

  <select id="network">
    <option value="">Select Network</option>
    <option value="MTN">MTN Mobile Money</option>
    <option value="Airtel">Airtel Money</option>
  </select>

  <input type="text" id="account" placeholder="Phone Number">

  <button onclick="withdraw()">Withdraw Now</button>
</div>

<div id="popup" class="popup">
  <p id="popupMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { 
  getDatabase, 
  ref, 
  onValue, 
  update, 
  push 
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentBalance = 0;
let userId = null;

/* POPUP */
function showPopup(message, type){
  const popup = document.getElementById("popup");
  popup.className = "popup show " + type;
  document.getElementById("popupMsg").innerText = message;

  setTimeout(()=>{
    popup.classList.remove("show");
  },2200);
}

/* LOAD USER */
auth.onAuthStateChanged(user => {
  if(user){
    userId = user.uid;

    const userRef = ref(db, "users/" + userId);

    onValue(userRef, (snapshot)=>{
      const data = snapshot.val();
      if(!data) return;

      let main = data.balance || 0;
      let locked = data.lockedBalance || 0;

      currentBalance = main - locked;
      if(currentBalance < 0) currentBalance = 0;

      document.getElementById("balance").innerText = currentBalance + " UGX";
    });

  } else {
    window.location.href = "login.html";
  }
});

/* WITHDRAW */
window.withdraw = function(){
  let amount = parseFloat(document.getElementById("amount").value);
  let network = document.getElementById("network").value;
  let account = document.getElementById("account").value.trim();

  if(!amount || !account){
    return showPopup("Fill in the required fields","error");
  }

  if(!network){
    return showPopup("Select network","error");
  }

  if(amount < 2000){
    return showPopup("Minimum withdrawal is 2,000 UGX","error");
  }

  if(amount > currentBalance){
    return showPopup("Insufficient balance","error");
  }

  const userRef = ref(db, "users/" + userId);

  const txRef = ref(db, "transactions/" + userId);
  push(txRef, {
    type: "withdraw",
    amount: amount,
    network: network,
    account: account,
    status: "pending",
    date: Date.now()
  });

  update(userRef, {
    balance: currentBalance - amount
  });

  showPopup("Withdrawal request submitted","success");

  document.getElementById("amount").value = "";
  document.getElementById("network").value = "";
  document.getElementById("account").value = "";
}
</script>

</body>
</html>
