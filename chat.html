<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Apex Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
  height:100%;
  overflow:hidden;
  background:#e5e7eb; /* ✅ LIGHT BACKGROUND */
  color:#111;
}

/* ✅ BRIGHT CHAT AREA */
.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:
    linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
    url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
}

/* KEEP STRUCTURE SAME */
#chatApp{height:100%;display:flex;flex-direction:column;}

.header{
  padding:12px;
  text-align:center;
  background:#22c55e;
  color:#000;
  font-weight:600;
}

.status{font-size:11px;color:#065f46;}

.msg{margin-bottom:12px;max-width:75%;}

.name{font-size:11px;color:#0ea5e9;}

.time{font-size:10px;opacity:0.6;margin-left:6px;}

.bubble{
  padding:10px;
  border-radius:12px;
  margin-top:3px;
  position:relative;
}

/* MY MESSAGE */
.me{align-self:flex-end;}
.me .bubble{
  background:#22c55e;
  color:#000;
}

/* OTHER MESSAGE */
.other .bubble{
  background:#ffffff;
  color:#111;
  border:1px solid #ddd;
}

.tick{font-size:11px;margin-left:6px;}

.chat-img{
  max-width:150px;
  border-radius:10px;
  margin-top:5px;
}

.typing{
  font-size:12px;
  color:#555;
  padding:5px 10px;
}

/* INPUT */
.input-box{
  display:flex;
  padding:8px;
  background:#f1f5f9;
  gap:6px;
}

#msgInput{
  flex:1;
  padding:8px;
  border:none;
  border-radius:20px;
  outline:none;
}

.icon-btn{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  background:#e2e8f0;
  border:none;border-radius:50%;
  color:#000;
}

.send-btn{
  background:#22c55e;
  color:#000;
}

#fileInput{display:none;}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  display:none;
}

/* ✅ BETTER REPLY VISIBILITY */
.reply-box{
  background:#dcfce7;
  padding:6px;
  font-size:12px;
  margin-bottom:5px;
  border-left:4px solid #22c55e;
  color:#065f46;
  border-radius:6px;
}

/* REACTION */
.reaction{
  position:absolute;
  bottom:-10px;
  right:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Username</h2>
  <input id="username">
  <input id="email" placeholder="Email">
  <button onclick="enterChat()">Continue</button>
</div>

<div id="chatApp" style="display:none;">
  <div class="header">
    Quantum Apex Live Chat
    <div id="status" class="status"></div>
  </div>

  <div id="messages" class="messages"></div>
  <div id="typing" class="typing"></div>

  <div class="input-box">
    <button class="icon-btn" onclick="fileInput.click()">📎</button>
    <input id="msgInput" placeholder="Type message...">
    <button class="icon-btn send-btn" onclick="sendMessage()">➤</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    firebase.auth().signInAnonymously();
  } else {
    autoLoadUser(user.uid);
  }
});

let currentUser="";
let currentEmail="";
let replyTo=null;

/* AUTO LOAD USER */
function autoLoadUser(uid){
  db.ref("users/"+uid).once("value").then(snap=>{
    let data = snap.val();

    if(data && data.username && data.email){
      currentUser = data.username;
      currentEmail = data.email;

      localStorage.setItem("chatUser", currentUser);
      localStorage.setItem("chatEmail", currentEmail);

      showChat();
    } else {
      initApp();
    }
  });
}

function initApp(){
  currentUser = localStorage.getItem("chatUser") || "";
  currentEmail = localStorage.getItem("chatEmail") || "";

  if(currentUser && currentEmail){
    showChat();
  }
}

function showToast(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

function enterChat(){
  let name=username.value.trim();
  let emailVal=email.value.trim();
  if(!name || !emailVal) return;

  localStorage.setItem("chatUser",name);
  localStorage.setItem("chatEmail",emailVal);

  currentUser=name;
  currentEmail=emailVal;

  showChat();
}

function showChat(){
  login.style.display="none";
  chatApp.style.display="flex";
  loadMessages();
  listenTyping();
  trackPresence();
}

/* PRESENCE */
function trackPresence(){
  setInterval(()=>{
    db.ref("presence/"+currentEmail).set({
      name:currentUser,
      lastSeen:Date.now(),
      online:true
    });
  },5000);

  db.ref("presence").on("value",snap=>{
    let online=0;
    snap.forEach(d=>{
      let val=d.val();
      if(val.online) online++;
    });
    status.innerText = online+" online";
  });
}

/* TYPING */
msgInput.addEventListener("input", ()=>{
  db.ref("typing/"+currentEmail).set({
    name:currentUser,
    typing: msgInput.value.length>0
  });
});

function listenTyping(){
  db.ref("typing").on("value",snap=>{
    let t="";
    snap.forEach(d=>{
      let val=d.val();
      if(val && val.typing && d.key!==currentEmail){
        t=val.name+" is typing...";
      }
    });
    typing.innerText=t;
  });
}

/* SEND */
function sendMessage(){
  let text=msgInput.value.trim();
  let file=fileInput.files[0];
  if(!text && !file) return;

  let id=Date.now();

  let data={
    id:id,
    name:currentUser,
    userEmail:currentEmail,
    time:Date.now(),
    delivered:true,
    reply: replyTo || null
  };

  replyTo=null;

  if(file){
    let reader=new FileReader();
    reader.onload=e=>{
      data.image=e.target.result;
      db.ref("messages/"+id).set(data);
    };
    reader.readAsDataURL(file);
  } else {
    data.text=text;
    db.ref("messages/"+id).set(data);
  }

  msgInput.value="";
  fileInput.value="";
}

/* LOAD */
function loadMessages(){
  db.ref("messages").on("value",snap=>{
    messages.innerHTML="";

    snap.forEach(d=>{
      let m=d.val();
      if(!m) return;

      let div=document.createElement("div");
      div.className="msg "+(m.userEmail===currentEmail?"me":"other");

      div.ondblclick=()=>{
        db.ref("messages/"+m.id+"/reaction").set("❤️");
      };

      div.oncontextmenu=(e)=>{
        e.preventDefault();
        if(m.userEmail===currentEmail){
          db.ref("messages/"+m.id).remove();
        }
      };

      let startX=0;
      div.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
      div.addEventListener("touchend",e=>{
        let diff=e.changedTouches[0].clientX - startX;
        if(diff>60){
          replyTo = m.text || "📷 image";
          showToast("Replying...");
        }
      });

      let replyHTML = m.reply ? `<div class="reply-box">${m.reply}</div>` : "";

      let content=m.text || `<img src="${m.image}" class="chat-img">`;

      let ticks = m.userEmail===currentEmail ? `<span class="tick">✓✓</span>` : "";

      div.innerHTML=`
        <div class="name">
          ${m.name}
          <span class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
        </div>

        <div class="bubble">
          ${replyHTML}
          ${content}
          ${ticks}
          ${m.reaction ? `<div class="reaction">${m.reaction}</div>` : ""}
        </div>
      `;

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}
</script>

</body>
  </html>
