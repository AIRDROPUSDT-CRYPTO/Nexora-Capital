<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referrals | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#020617,#0f172a);
  color:#fff;
}

.topbar{
  padding:15px;
  text-align:center;
  font-weight:600;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
}

.container{padding:20px;}

.card{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  padding:20px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  margin-bottom:15px;
}

.title{
  font-size:15px;
  margin-bottom:10px;
  color:#38bdf8;
}

.link-box{
  background:#020617;
  padding:12px;
  border-radius:10px;
  font-size:13px;
  word-break:break-all;
  margin-bottom:10px;
  border:1px solid rgba(148,163,184,0.2);
}

.copy-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.stats{
  text-align:center;
  margin-top:10px;
}

.stats h2{
  font-size:28px;
  color:#22c55e;
}

.stats p{
  font-size:13px;
  color:#94a3b8;
}

/* POPUP */
.popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#020617;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
  z-index:1000;
}

.popup.show{opacity:1;}
.popup.success{border:2px solid #22c55e;}
.popup.error{border:2px solid #ef4444;}
</style>
</head>

<body>

<div class="topbar">Referral Program</div>

<div class="container">

  <div class="card">
    <div class="title">Your Referral Link</div>
    <div id="refLink" class="link-box">Loading...</div>
    <button class="copy-btn" onclick="copyLink()">Copy Link</button>
  </div>

  <div class="card stats">
    <h2 id="refCount">0</h2>
    <p>Total Referrals</p>
  </div>

</div>

<div id="popup" class="popup">
  <p id="popupMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentLink = "";

/* POPUP */
function showPopup(msg,type){
  const popup = document.getElementById("popup");
  popup.className = "popup show " + type;
  document.getElementById("popupMsg").innerText = msg;

  setTimeout(()=> popup.classList.remove("show"),2000);
}

/* COPY */
window.copyLink = function(){
  if(!currentLink) return;

  navigator.clipboard.writeText(currentLink)
  .then(()=> showPopup("Link copied","success"))
  .catch(()=> showPopup("Copy failed","error"));
}

/* AUTH + DATA */
onAuthStateChanged(auth, user => {

  /* ❌ NO REDIRECT — just stop execution */
  if(!user){
    showPopup("User not authenticated","error");
    return;
  }

  const userRef = ref(db,"users/" + user.uid);

  onValue(userRef, snap => {
    const data = snap.val();
    if(!data) return;

    const username = data.username;

    /* 🔒 SECURE LINK (FROM DB ONLY) */
    currentLink = window.location.origin + "/register.html?ref=" + username;

    document.getElementById("refLink").innerText = currentLink;

    /* REFERRAL COUNT */
    onValue(ref(db,"users"), usersSnap => {

      let count = 0;

      usersSnap.forEach(child => {
        const u = child.val();

        if(u.referral === username){
          count++;
        }
      });

      document.getElementById("refCount").innerText = count;
    });

  });

});
</script>

</body>
</html>
